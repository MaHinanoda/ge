<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブロック崩し</title>
<style>
body {
  margin: 0;
  background: #111;
}
canvas {
  display: block;
  margin: 20px auto;
  background: black;
}
#retryBtn {
  display: none;
  margin: 10px auto;
  padding: 10px 20px;
  font-size: 18px;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<button id="retryBtn">もう一回</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let animationId;

// ===== サイズ調整 =====
function resizeCanvas() {
  let maxWidth = 900;

  canvas.width = Math.min(window.innerWidth, maxWidth);
  canvas.height = canvas.width * 0.66;

  paddleWidth = canvas.width * 0.2;
  ballRadius = canvas.width * 0.025;

  paddleX = (canvas.width - paddleWidth) / 2;

  brickWidth = canvas.width / brickColumnCount - 10;
}
window.addEventListener("resize", resizeCanvas);

// ===== 画像 =====
const ballImage = new Image();
ballImage.src = "ball.png";

// ===== ボール =====
let x, y, dx, dy;
let ballRadius;

// ===== パドル =====
let paddleHeight = 10;
let paddleWidth;
let paddleX;

// ===== 操作 =====
let rightPressed = false;
let leftPressed = false;

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") rightPressed = true;
  if (e.key === "ArrowLeft") leftPressed = true;
});
document.addEventListener("keyup", e => {
  if (e.key === "ArrowRight") rightPressed = false;
  if (e.key === "ArrowLeft") leftPressed = false;
});

// タッチ操作
canvas.addEventListener("touchmove", function(e) {
  e.preventDefault();
  let rect = canvas.getBoundingClientRect();
  let touchX = e.touches[0].clientX - rect.left;
  paddleX = touchX - paddleWidth / 2;
}, { passive: false });

// ===== ブロック =====
let brickRowCount = 5;
let brickColumnCount = 7;
let brickWidth;
let brickHeight = 20;
let brickPadding = 10;
let brickOffsetTop = 30;
let brickOffsetLeft = 20;

let bricks = [];
for (let c = 0; c < brickColumnCount; c++) {
  bricks[c] = [];
  for (let r = 0; r < brickRowCount; r++) {
    bricks[c][r] = { x: 0, y: 0, status: 1 };
  }
}

// ===== 初期化 =====
function resetGame() {
  resizeCanvas();

  x = canvas.width / 2;
  y = canvas.height - 40;
  dx = 3;
  dy = -3;

  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      bricks[c][r].status = 1;
    }
  }

  document.getElementById("retryBtn").style.display = "none";
  draw();
}

// ===== 描画 =====
function drawBall() {
  ctx.drawImage(
    ballImage,
    x - ballRadius,
    y - ballRadius,
    ballRadius * 2,
    ballRadius * 2
  );
}

function drawPaddle() {
  ctx.fillStyle = "white";
  ctx.fillRect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
}

function drawBricks() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      let b = bricks[c][r];
      if (b.status === 1) {
        let brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
        let brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
        b.x = brickX;
        b.y = brickY;

        ctx.fillStyle = "white";
        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
      }
    }
  }
}

// ===== 当たり判定 =====
function collisionDetection() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      let b = bricks[c][r];
      if (b.status === 1) {
        let prevX = x - dx;
        let prevY = y - dy;

        if (
          x + ballRadius > b.x &&
          x - ballRadius < b.x + brickWidth &&
          y + ballRadius > b.y &&
          y - ballRadius < b.y + brickHeight
        ) {
          if (prevX < b.x || prevX > b.x + brickWidth) {
            dx = -dx;
          } else {
            dy = -dy;
          }
          b.status = 0;
        }
      }
    }
  }
}

// ===== メイン =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBall();
  drawPaddle();
  drawBricks();
  collisionDetection();

  if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
  if (y + dy < ballRadius) dy = -dy;

  // パドル
  if (y + dy > canvas.height - ballRadius) {
    if (x > paddleX && x < paddleX + paddleWidth) {
      let hit = (x - (paddleX + paddleWidth / 2)) / (paddleWidth / 2);
      dx = hit * 5;
      dy = -Math.abs(dy);
    } else {
      cancelAnimationFrame(animationId);
      document.getElementById("retryBtn").style.display = "block";
      return;
    }
  }

  // PC操作
  if (rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 6;
  if (leftPressed && paddleX > 0) paddleX -= 6;

  x += dx;
  y += dy;

  animationId = requestAnimationFrame(draw);
}

// リトライ
document.getElementById("retryBtn").onclick = resetGame;

// スタート
resetGame();
</script>

</body>
</html>
