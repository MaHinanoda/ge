<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>究極ブロック崩し - 10 STAGES</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-image: url("IMG_4675.png");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    color: white;
    touch-action: none; /* スマホのデフォルトスクロールを禁止 */
    overflow: hidden;
  }
  #menu {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .stage-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin: 20px;
  }
  .stage-btn {
    width: 55px;
    height: 55px;
    background: #333;
    border: 2px solid #fff;
    color: white;
    cursor: pointer;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
  }
  .stage-btn:active { background: #ff595e; }
  .stage-btn.hard { border-color: #ff0000; color: #ff0000; }

  canvas {
    display: block;
    background: rgba(0, 0, 0, 0.85);
    border: 2px solid #fff;
    margin-top: 10px;
  }
  .controls {
    margin-top: 15px;
    display: flex;
    gap: 10px;
  }
  button.ui-btn {
    padding: 12px 24px;
    font-size: 16px;
    background: white;
    color: black;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
  }
  #hud {
    font-size: 18px;
    margin-top: 10px;
    text-shadow: 2px 2px 4px #000;
  }
</style>
</head>
<body>

<div id="menu">
  <h1 style="font-size: 28px; margin-bottom: 10px;">STAGE SELECT</h1>
  <div class="stage-grid" id="stageGrid"></div>
  <p style="font-size: 14px; color: #aaa;">好きなステージを選んでスタート！</p>
</div>

<div id="hud">
  <span id="stageName">STAGE 1</span> | Score: <span id="score">0</span>
</div>

<canvas id="game"></canvas>

<div class="controls">
  <button id="retryBtn" class="ui-btn" style="display:none;">もう一回</button>
  <button id="menuBtn" class="ui-btn">ステージ選択へ</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const sfxBreak = new Audio("Fracture03-1(Dry).mp3");

let animationId;
const ballImage = new Image();
ballImage.src = "ball.png";

let currentStage = 1;
let score = 0;
let ballRadius, x, y, dx, dy;
let paddleHeight = 15;
let paddleWidth, paddleX;
let rightPressed = false, leftPressed = false;

const brickRowCount = 8;
const brickColumnCount = 10;
let brickWidth, brickHeight, brickPadding = 6, brickOffsetTop = 40, brickOffsetLeft = 10;
const brickColors = ["#FF595E", "#FFCA3A", "#8AC926", "#1982C4", "#6A4C93", "#F15BB5", "#EE6055", "#60D394"];

let bricks = [];

// メニュー生成
const grid = document.getElementById("stageGrid");
for(let i=1; i<=10; i++) {
  const btn = document.createElement("button");
  btn.className = "stage-btn" + (i === 10 ? " hard" : "");
  btn.innerText = i;
  btn.onclick = () => startLevel(i);
  grid.appendChild(btn);
}

function resizeCanvas() {
  const maxWidth = 800;
  const scale = Math.min(window.innerWidth - 20, maxWidth);
  canvas.width = scale;
  canvas.height = scale * 0.75;
  
  // スマホ向けにパドルを少し大きく（Stage10以外）
  paddleWidth = (currentStage === 10) ? 15 : canvas.width * 0.25;
  ballRadius = canvas.width * 0.025;
  brickWidth = (canvas.width - (brickOffsetLeft * 2) - (brickPadding * (brickColumnCount - 1))) / brickColumnCount;
  brickHeight = canvas.height * 0.04;
}

function getLayout(stage) {
  let layout = [];
  for(let c=0; c<brickColumnCount; c++) {
    layout[c] = [];
    for(let r=0; r<brickRowCount; r++) {
      let v = 0;
      if(stage === 1) v = 1; 
      if(stage === 2) v = (r < 4) ? 1 : 0;
      if(stage === 3) v = (c % 2 === 0) ? 1 : 0;
      if(stage === 4) v = (r % 2 === 0) ? 1 : 0;
      if(stage === 5) v = (c === r || c === (brickColumnCount-1)-r) ? 1 : 0;
      if(stage === 6) v = (r === 0 || r === 7 || c === 0 || c === 9) ? 1 : 0;
      if(stage === 7) v = (c+r) % 3 === 0 ? 1 : 0;
      if(stage === 8) v = (r > 1 && r < 6 && c > 1 && c < 8) ? 0 : 1;
      if(stage === 9) v = 1; 
      if(stage === 10) v = 1; // 絶対クリア不可
      layout[c][r] = { x: 0, y: 0, status: v };
    }
  }
  return layout;
}

function startLevel(stage) {
  currentStage = stage;
  document.getElementById("menu").style.display = "none";
  document.getElementById("stageName").innerText = "STAGE " + stage;
  document.getElementById("retryBtn").style.display = "none";
  resizeCanvas();
  
  bricks = getLayout(stage);
  x = canvas.width / 2;
  y = canvas.height - 50;
  
  let speed = 4 + (stage * 0.6);
  if(stage === 9) speed = 9;
  if(stage === 10) speed = 14; // 超速
  
  dx = speed;
  dy = -speed;
  paddleX = (canvas.width - paddleWidth) / 2;
  score = 0;
  document.getElementById("score").innerText = score;
  cancelAnimationFrame(animationId);
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  let activeCount = 0;
  for(let c=0; c<brickColumnCount; c++) {
    for(let r=0; r<brickRowCount; r++) {
      let b = bricks[c][r];
      if(b.status === 1) {
        activeCount++;
        let bx = c*(brickWidth+brickPadding)+brickOffsetLeft;
        let by = r*(brickHeight+brickPadding)+brickOffsetTop;
        b.x = bx; b.y = by;
        ctx.fillStyle = brickColors[r];
        ctx.fillRect(bx, by, brickWidth, brickHeight);
      }
    }
  }

  // ステージ10専用：無限ブロック生成
  if(currentStage === 10 && activeCount < 30) {
      bricks[Math.floor(Math.random()*brickColumnCount)][Math.floor(Math.random()*brickRowCount)].status = 1;
  }

  ctx.drawImage(ballImage, x - ballRadius, y - ballRadius, ballRadius * 2, ballRadius * 2);
  ctx.fillStyle = "white";
  ctx.fillRect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);

  // 当たり判定
  for(let c=0; c<brickColumnCount; c++) {
    for(let r=0; r<brickRowCount; r++) {
      let b = bricks[c][r];
      if(b.status === 1) {
        if(x > b.x && x < b.x+brickWidth && y > b.y && y < b.y+brickHeight) {
          dy = -dy; b.status = 0;
          score += 10; document.getElementById("score").innerText = score;
          sfxBreak.currentTime = 0; sfxBreak.play().catch(()=>{});
        }
      }
    }
  }

  if(x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
  if(y + dy < ballRadius) dy = -dy;
  if(y + dy > canvas.height - ballRadius) {
    if(x > paddleX && x < paddleX + paddleWidth) {
      dy = -Math.abs(dy);
      // 当たった場所によって角度を変える
      dx = 10 * ((x - (paddleX + paddleWidth / 2)) / paddleWidth);
    } else {
      document.getElementById("retryBtn").style.display = "inline-block";
      return;
    }
  }

  if(rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 8;
  if(leftPressed && paddleX > 0) paddleX -= 8;

  x += dx; y += dy;
  if(activeCount === 0 && currentStage !== 10) { 
    alert("STAGE CLEAR!"); 
    document.getElementById("menu").style.display = "flex"; 
    return; 
  }
  animationId = requestAnimationFrame(draw);
}

// スマホ・PC共通操作
const handleMove = (inputX) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  paddleX = (inputX - rect.left) * scaleX - paddleWidth / 2;
  if(paddleX < 0) paddleX = 0;
  if(paddleX > canvas.width - paddleWidth) paddleX = canvas.width - paddleWidth;
};

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  handleMove(e.touches[0].clientX);
}, { passive: false });

canvas.addEventListener("mousemove", (e) => {
  handleMove(e.clientX);
});

document.addEventListener("keydown", e => {
  if(e.key === "ArrowRight") rightPressed = true;
  if(e.key === "ArrowLeft") leftPressed = true;
});
document.addEventListener("keyup", e => {
  if(e.key === "ArrowRight") rightPressed = false;
  if(e.key === "ArrowLeft") leftPressed = false;
});

document.getElementById("retryBtn").onclick = () => startLevel(currentStage);
document.getElementById("menuBtn").onclick = () => {
  cancelAnimationFrame(animationId);
  document.getElementById("menu").style.display = "flex";
};

// リサイズ対応
window.addEventListener("resize", () => {
  if (document.getElementById("menu").style.display === "none") {
    resizeCanvas();
  }
});
</script>
</body>
</html>
