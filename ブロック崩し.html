<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>究極・スマホ最適化版ブロック崩し</title>
<style>
  /* --------------------------------------------------
     デザイン設定（CSS）
     -------------------------------------------------- */
  body {
    margin: 0; padding: 0;
    background-image: url("IMG_4675.png");
    background-size: cover; background-position: center; background-attachment: fixed;
    display: flex; flex-direction: column; align-items: center;
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    color: white; touch-action: none; overflow: hidden;
  }

  /* ステージ選択メニュー：スマホではみ出さないよう flex-wrap を使用 */
  #menu {
    position: fixed; inset: 0; background: rgba(0,0,0,0.96);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 999; padding: 20px; box-sizing: border-box;
  }

  #title-msg { font-size: 28px; font-weight: bold; text-shadow: 0 0 10px #00d4ff; text-align: center; }
  
  /* ボタンが画面幅に合わせて自動改行されるように修正 */
  .stage-grid {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 12px; max-width: 100%; margin: 20px 0;
  }

  .stage-btn {
    width: 55px; height: 55px; background: #111; border: 2px solid #00d4ff;
    color: #00d4ff; cursor: pointer; font-size: 20px; font-weight: bold; border-radius: 12px;
  }

  /* ゲーム画面のレイアウト調整 */
  canvas {
    display: block; background: rgba(0, 0, 0, 0.9);
    border: 2px solid #fff; margin-top: 10px;
  }

  #hud { margin-top: 10px; text-align: center; width: 100%; }
  #score-container { font-size: 18px; }
  
  .controls { margin-top: 10px; display: flex; gap: 10px; }
  .ui-btn {
    padding: 10px 25px; font-size: 16px; background: #fff; color: #000;
    border: none; border-radius: 50px; font-weight: bold;
  }

  #retryBtn { background: #ff595e; color: #fff; display: none; }
  
  #guide-msg {
    position: absolute; width: 100%; text-align: center;
    top: 55%; font-size: 20px; font-weight: bold;
    color: #00d4ff; pointer-events: none; display: none;
  }
</style>
</head>
<body>

  <div id="menu">
    <div id="title-msg">勇者、降臨</div>
    <div id="sub-title" style="color:#00d4ff; margin-bottom:10px;">ステージを選択</div>
    <div class="stage-grid" id="stageGrid"></div>
    <div style="color: #888; font-size: 12px; text-align: center;">PC: 十字キー / スマホ: スライド移動<br>タップでボール射出</div>
  </div>

  <div id="hud">
    <div id="stageName" style="font-weight:bold;">STAGE 1</div>
    <div id="score-container">SCORE: <span id="score">0</span></div>
    <div id="location-badge" style="font-size:12px; color:#00d4ff;">REGION: ...</div>
  </div>

  <div style="position: relative; width: 100%; display: flex; justify-content: center;">
    <canvas id="game"></canvas>
    <div id="guide-msg">タップで射出！</div>
  </div>

  <div class="controls">
    <button id="retryBtn" class="ui-btn">なけなしのもう一回</button>
    <button id="menuBtn" class="ui-btn">メニュー</button>
  </div>

<script>
  /* --------------------------------------------------
     JavaScript 処理
     -------------------------------------------------- */
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreDisplay = document.getElementById("score");
  const stageDisplay = document.getElementById("stageName");
  const retryBtn = document.getElementById("retryBtn");
  const guideMsg = document.getElementById("guide-msg");
  const ballImage = new Image();
  ballImage.src = "ball.png";

  let animationId;
  let currentStage = 1;
  let score = 0;
  let userRegion = "未知";
  let x, y, dx, dy;
  let ballRadius, paddleWidth, paddleHeight = 15, paddleX;
  
  let isWaiting = true;
  let rightPressed = false, leftPressed = false;

  const brickRowCount = 8;
  const brickColumnCount = 10;
  const brickPadding = 5;
  let brickOffsetTop, brickOffsetLeft = 8; // OffsetTopはリサイズ時に動的計算
  let brickWidth, brickHeight;
  const brickColors = ["#FF595E", "#FFCA3A", "#8AC926", "#1982C4", "#6A4C93", "#F15BB5", "#EE6055", "#60D394"];
  let bricks = [];

  // 地域取得
  fetch('https://ipapi.co/json/')
    .then(res => res.json())
    .then(data => {
      userRegion = data.region || "どこか";
      document.getElementById("title-msg").innerText = userRegion + "の勇者よ";
      document.getElementById("location-badge").innerText = "REGION: " + userRegion;
    });

  // メニュー生成
  const grid = document.getElementById("stageGrid");
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement("button");
    btn.className = "stage-btn" + (i === 10 ? " hard" : "");
    btn.innerText = i;
    btn.onclick = () => startLevel(i);
    grid.appendChild(btn);
  }

  function resizeGame() {
    const maxWidth = 600; // スマホ向けに最大幅を調整
    const size = Math.min(window.innerWidth - 20, maxWidth);
    canvas.width = size;
    // スマホの縦長画面でもブロックとバーの距離を保つため、高さを画面に合わせて調整
    canvas.height = Math.min(window.innerHeight * 0.6, size * 1.2);

    ballRadius = canvas.width * 0.03; 
    brickWidth = (canvas.width - (brickOffsetLeft * 2) - (brickPadding * (brickColumnCount - 1))) / brickColumnCount;
    brickHeight = canvas.height * 0.04;
    
    // 【重要】スマホで窮屈にならないよう、ブロックの開始位置を調整
    brickOffsetTop = 40; 
    
    paddleWidth = (currentStage === 10) ? 35 : canvas.width * 0.25;
  }

  function createBricks(stage) {
    bricks = [];
    for (let c = 0; c < brickColumnCount; c++) {
      bricks[c] = [];
      for (let r = 0; r < brickRowCount; r++) {
        let status = 1;
        if (stage === 2) status = (r < 4) ? 1 : 0;
        if (stage === 3) status = (c % 2 === 0) ? 1 : 0;
        if (stage === 5) status = (c === r || c === (brickColumnCount - 1) - r) ? 1 : 0;
        if (stage === 8) status = (r > 1 && r < 6 && c > 1 && c < 8) ? 0 : 1;
        bricks[c][r] = { status: status };
      }
    }
  }

  function startLevel(stage) {
    currentStage = stage;
    document.getElementById("menu").style.display = "none";
    stageDisplay.innerText = (stage === 10) ? "FINAL: DESPAIR" : "STAGE " + stage;
    retryBtn.style.display = "none";
    guideMsg.style.display = "block";
    score = 0;
    scoreDisplay.innerText = score;
    resizeGame();
    createBricks(stage);
    paddleX = (canvas.width - paddleWidth) / 2;
    resetBall();
    if (animationId) cancelAnimationFrame(animationId);
    draw();
  }

  function resetBall() {
    isWaiting = true;
    x = paddleX + paddleWidth / 2;
    y = canvas.height - paddleHeight - ballRadius - 5;
    let speed = 4 + (currentStage * 0.6);
    if (currentStage === 10) speed = 14;
    dx = speed * (Math.random() > 0.5 ? 1 : -1);
    dy = -speed;
  }

  function launchBall() {
    if (isWaiting) {
      isWaiting = false;
      guideMsg.style.display = "none";
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let activeBricks = 0;
    for (let c = 0; c < brickColumnCount; c++) {
      for (let r = 0; r < brickRowCount; r++) {
        let b = bricks[c][r];
        if (b.status === 1) {
          activeBricks++;
          let bx = c * (brickWidth + brickPadding) + brickOffsetLeft;
          let by = r * (brickHeight + brickPadding) + brickOffsetTop;
          ctx.fillStyle = brickColors[r];
          ctx.fillRect(bx, by, brickWidth, brickHeight);
        }
      }
    }

    if (currentStage === 10 && activeBricks < 40) {
      bricks[Math.floor(Math.random()*brickColumnCount)][Math.floor(Math.random()*brickRowCount)].status = 1;
    }

    if (rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 10;
    if (leftPressed && paddleX > 0) paddleX -= 10;

    if (isWaiting) {
      x = paddleX + paddleWidth / 2;
      y = canvas.height - paddleHeight - ballRadius - 5;
    } else {
      collisionDetection();
      x += dx; y += dy;
      if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
      if (y + dy < ballRadius) dy = -dy;
      if (y + dy > canvas.height - ballRadius - paddleHeight) {
        if (x > paddleX - ballRadius && x < paddleX + paddleWidth + ballRadius) {
          if (y < canvas.height - paddleHeight) {
            dy = -Math.abs(dy);
            dx = ((x - (paddleX + paddleWidth / 2)) / (paddleWidth / 2)) * 10;
          }
        } else if (y + dy > canvas.height - ballRadius) {
          retryBtn.style.display = "inline-block";
          return;
        }
      }
    }

    ctx.drawImage(ballImage, x - ballRadius, y - ballRadius, ballRadius * 2, ballRadius * 2);
    ctx.fillStyle = "#00d4ff";
    ctx.fillRect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);

    if (activeBricks === 0 && currentStage !== 10) {
      alert(userRegion + "に平和が訪れた！");
      document.getElementById("menu").style.display = "flex";
      return;
    }
    animationId = requestAnimationFrame(draw);
  }

  function collisionDetection() {
    for (let c = 0; c < brickColumnCount; c++) {
      for (let r = 0; r < brickRowCount; r++) {
        let b = bricks[c][r];
        if (b.status === 1) {
          let bx = c * (brickWidth + brickPadding) + brickOffsetLeft;
          let by = r * (brickHeight + brickPadding) + brickOffsetTop;
          if (x + ballRadius > bx && x - ballRadius < bx + brickWidth &&
              y + ballRadius > by && y - ballRadius < by + brickHeight) {
            dy = -dy; b.status = 0;
            score += 10; scoreDisplay.innerText = score;
            return;
          }
        }
      }
    }
  }

  // キー操作
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight") rightPressed = true;
    if (e.key === "ArrowLeft") leftPressed = true;
    if (e.key === " " || e.key === "Enter") launchBall();
  });
  document.addEventListener("keyup", (e) => {
    if (e.key === "ArrowRight") rightPressed = false;
    if (e.key === "ArrowLeft") leftPressed = false;
  });

  // タッチ/マウス操作
  function handleMove(inputX) {
    const rect = canvas.getBoundingClientRect();
    const scale = canvas.width / rect.width;
    paddleX = (inputX - rect.left) * scale - (paddleWidth / 2);
    if (paddleX < 0) paddleX = 0;
    if (paddleX > canvas.width - paddleWidth) paddleX = canvas.width - paddleWidth;
  }
  canvas.addEventListener("mousemove", (e) => handleMove(e.clientX));
  canvas.addEventListener("touchmove", (e) => { e.preventDefault(); handleMove(e.touches[0].clientX); }, { passive: false });
  canvas.addEventListener("mousedown", launchBall);
  canvas.addEventListener("touchstart", (e) => { e.preventDefault(); launchBall(); }, { passive: false });

  retryBtn.onclick = () => startLevel(currentStage);
  document.getElementById("menuBtn").onclick = () => {
    cancelAnimationFrame(animationId);
    document.getElementById("menu").style.display = "flex";
  };
  window.addEventListener("resize", resizeGame);
</script>
</body>
</html>
