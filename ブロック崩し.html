<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ブロック崩し</title>

<style>
body {
  margin: 0;
  /* index.htmlと同じ背景画像を使用 */
  background-image: url("IMG_4675.png");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: sans-serif;
}
canvas {
  display: block;
  margin: 20px auto;
  background: rgba(0, 0, 0, 0.8); /* 背景が見えるよう少し透過 */
  border: 2px solid #fff;
}
#retryBtn {
  display: none;
  margin: 10px auto;
  padding: 12px 20px;
  font-size: 18px;
  background: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<button id="retryBtn">もう一回</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let animationId;

// ===== 画像の読み込み =====
const ballImage = new Image();
ballImage.src = "ball.png";

// ===== 変数設定 =====
let ballRadius;
let x, y, dx, dy;
let paddleHeight = 12;
let paddleWidth;
let paddleX;
let rightPressed = false;
let leftPressed = false;

// ブロック設定
const brickRowCount = 5;
const brickColumnCount = 7;
let brickWidth;
let brickHeight = 20;
let brickPadding = 10;
let brickOffsetTop = 30;
let brickOffsetLeft = 20;

// 段ごとの色
const brickColors = ["#FF595E", "#FFCA3A", "#8AC926", "#1982C4", "#6A4C93"];

let bricks = [];
for (let c = 0; c < brickColumnCount; c++) {
  bricks[c] = [];
  for (let r = 0; r < brickRowCount; r++) {
    bricks[c][r] = { x: 0, y: 0, status: 1 };
  }
}

function resizeCanvas() {
  const maxWidth = 900;
  canvas.width = Math.min(window.innerWidth - 20, maxWidth);
  canvas.height = canvas.width * 0.66;

  paddleWidth = canvas.width * 0.2;
  // ボールのサイズを画面に合わせて調整
  ballRadius = canvas.width * 0.03; 

  paddleX = (canvas.width - paddleWidth) / 2;
  brickWidth = (canvas.width - (brickOffsetLeft * 2) - (brickPadding * (brickColumnCount - 1))) / brickColumnCount;
}

// ===== 操作 =====
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") rightPressed = true;
  if (e.key === "ArrowLeft") leftPressed = true;
});
document.addEventListener("keyup", e => {
  if (e.key === "ArrowRight") rightPressed = false;
  if (e.key === "ArrowLeft") leftPressed = false;
});

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touchX = e.touches[0].clientX - rect.left;
  paddleX = touchX - paddleWidth / 2;
  if (paddleX < 0) paddleX = 0;
  if (paddleX > canvas.width - paddleWidth) paddleX = canvas.width - paddleWidth;
}, { passive: false });

// ===== ゲーム処理 =====
function resetGame() {
  cancelAnimationFrame(animationId);
  resizeCanvas();

  x = canvas.width / 2;
  y = canvas.height - 60;
  dx = 4;
  dy = -4;

  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      bricks[c][r].status = 1;
    }
  }

  document.getElementById("retryBtn").style.display = "none";
  draw();
}

function collisionDetection() {
  let activeBricks = 0;
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      const b = bricks[c][r];
      if (b.status === 1) {
        activeBricks++;
        if (x + ballRadius > b.x && x - ballRadius < b.x + brickWidth &&
            y + ballRadius > b.y && y - ballRadius < b.y + brickHeight) {
          dy = -dy;
          b.status = 0;
        }
      }
    }
  }
  // 全て壊したらクリア
  if (activeBricks === 0) {
    alert("STAGE CLEAR!");
    resetGame();
  }
}

function drawBall() {
  ctx.drawImage(ballImage, x - ballRadius, y - ballRadius, ballRadius * 2, ballRadius * 2);
}

function drawPaddle() {
  ctx.fillStyle = "white";
  ctx.fillRect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
}

function drawBricks() {
  for (let c = 0; c < brickColumnCount; c++) {
    for (let r = 0; r < brickRowCount; r++) {
      const b = bricks[c][r];
      if (b.status === 1) {
        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
        b.x = brickX;
        b.y = brickY;
        ctx.fillStyle = brickColors[r];
        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBricks();
  drawBall();
  drawPaddle();
  collisionDetection();

  if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
  if (y + dy < ballRadius) dy = -dy;

  if (y + dy > canvas.height - ballRadius) {
    if (x > paddleX && x < paddleX + paddleWidth) {
      // パドルの端に当たるほど角度がつく処理
      const hitPos = (x - (paddleX + paddleWidth / 2)) / (paddleWidth / 2);
      dx = hitPos * 5;
      dy = -Math.abs(dy);
    } else {
      document.getElementById("retryBtn").style.display = "block";
      return;
    }
  }

  if (rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 7;
  if (leftPressed && paddleX > 0) paddleX -= 7;

  x += dx;
  y += dy;
  animationId = requestAnimationFrame(draw);
}

document.getElementById("retryBtn").onclick = resetGame;
window.addEventListener("resize", resizeCanvas);

// 画像読み込み完了を待たずに開始（もし読み込めなくても色はつく）
ballImage.onload = resetGame;
resetGame(); 
</script>

</body>
</html>
